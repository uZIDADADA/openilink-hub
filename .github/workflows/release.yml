name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # --- Build frontend (shared) ---
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: cd web && pnpm install --frozen-lockfile && pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: internal/web/dist/

  # --- Build darwin binaries on native macOS runners ---
  darwin:
    needs: frontend
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: macos-latest
          - goarch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: internal/web/dist/
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then VERSION="snapshot"; fi
          go build -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA::7} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o openilink-hub .
          tar czf "openilink-hub_${VERSION}_darwin_${{ matrix.goarch }}.tar.gz" openilink-hub
      - uses: actions/upload-artifact@v7
        with:
          name: darwin-${{ matrix.goarch }}
          path: "*.tar.gz"

  # --- Build linux + windows + Docker + publish release ---
  release:
    needs: [frontend, darwin]
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: internal/web/dist/

      - uses: actions/download-artifact@v8
        with:
          pattern: darwin-*
          path: darwin-archives/
          merge-multiple: true

      # Commit downloaded artifacts so GoReleaser sees clean git state
      - name: Commit artifacts for clean git state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f internal/web/dist/ darwin-archives/
          git commit -m "ci: add build artifacts" --no-verify

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
      - uses: docker/setup-qemu-action@v4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: >-
            release
            ${{ github.event_name == 'workflow_dispatch' && '--snapshot --clean' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
